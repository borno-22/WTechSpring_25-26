<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Portal</title>
</head>
<body>
    <h1>Contact us</h1>
    <form action="submit">
        <table>
            <tr>
                <td>
                    <label for="Fname" name="FirstName">First Name</label><br>
                    <input type="text" id="FirstName" name="FirstName">
                </td>
                <td>
                    <label for="Lname" name="Lname">LastName</label><br>
                    <input type="text" id="LastName" name="LastName">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email">
                </td>
                <td>
                    <label for="phone">Phone Number</label><br>
                    <input type="number" id="PhoneNumber" name="PhoneNumber">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="query">WHAT DO YOU HAVE IN MIND</label><br>
                    <textarea name="query" id="query">Please enter query</textarea>
                </td>
            </tr>
            <tr>
                <td><input type="submit"></td>
            </tr>
        </table>
    </form>
</body>
</html>
