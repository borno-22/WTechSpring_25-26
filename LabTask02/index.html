<!DOCTYPE html>
<html lang="eng">
<head>
    <title>Contact Us Form</title>
    <link rel ="stylesheet" href = "style.css">
</head>

<body>
    <h1>Contact Us</h1>
    <form>
        <table>
            <tr>
                <td>
                    <b><label for = "FName"> FIRST NAME </label><br></b>
                    <input type = "text" id = "FName" name = "FName"><br><br>
                </td>
                <td>
                    <b><label for = "LName"> LAST NAME </label><br></b>
                    <input type = "text" id = "LName" name = "LName"><br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <b><label for = "Email"> EMAIL </label><br></b>
                    <input type = "email" id = "Email" name = "Email"><br><br>
                </td>
                <td>
                    <b><label for = "PNumber"> PHONE NUMBER </label><br></b>
                    <input type = "number" id = "PNumber" name = "PNumber"><br><br>
                </td>
            </tr>
        </table>

        <b><label for = "Message"> WHAT DO YOU HAVE IN MIND </label><br></b>
        <textarea id = "Message" name = "Message" rows = "4" cols = "30" placeholder="Please enter query..."></textarea><br><br>

        <input type = "submit" id = "Submit" name = "Submit">
    </form>
</body>
